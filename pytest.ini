[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    # Подавляем DeprecationWarning из сторонних библиотек (asyncio, pydantic v1, pandas)
    ignore::DeprecationWarning:asyncio
    ignore::DeprecationWarning:pydantic
    ignore::DeprecationWarning:pandas
    # Превращаем DeprecationWarning собственного кода в ошибку
    error::DeprecationWarning:tms
markers =
    integration: mark test as integration (slow, simulation)
    async_integration: mark test as async integration (slow, DB, scheduler)
    unit: mark test as unit (fast, no IO)
    operational: test operational contour (scheduler, API, queue_manager)
    simulation: test simulation contour (simulator, runner, stats)
    core: test core business logic
    api: test REST API endpoints
    data: test data layer (repository, models)
