[alembic]
script_location = data/migrations
prepend_sys_path = .
version_path_separator = os

# Подключение переопределяется через env.py из DATABASE_URL
sqlalchemy.url = postgresql+asyncpg://tms_user:tms_pass@db:5432/tms

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
